<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f1115">
    <title>almoststable</title>
    <link rel="icon" href="/avatar.png?v=2" type="image/png">
    <link rel="shortcut icon" href="/favicon.ico?v=7" type="image/png">
    <link rel="apple-touch-icon" href="/avatar.png?v=2">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1115;
        color: #f3efe6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          #0f1115;
        background-size: 36px 36px;
      }

      main {
        width: min(960px, calc(100vw - 40px));
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(56px, 11vh, 108px) 0 56px;
        display: grid;
        align-content: start;
        gap: 34px;
      }

      .masthead {
        display: block;
      }

      .brand {
        display: grid;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: 72px;
        line-height: 0.92;
        letter-spacing: 0;
        font-weight: 760;
      }

      .domain {
        color: #f4c95d;
      }

      .byline {
        width: max-content;
        margin: -4px 0 0;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: #8f9aa5;
        font: 650 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-decoration: none;
        transition: color 160ms ease;
      }

      .byline:hover,
      .byline:focus-visible {
        color: #8cebd6;
        outline: none;
      }

      .avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 1px solid rgba(140, 235, 214, 0.45);
        object-fit: cover;
        box-shadow: 0 0 0 3px rgba(140, 235, 214, 0.08);
      }

      .routes {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .route {
        min-width: 0;
        min-height: 168px;
        border: 1px solid #323b44;
        border-radius: 8px;
        padding: 22px;
        background: rgba(20, 24, 29, 0.92);
        color: inherit;
        text-decoration: none;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 18px;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .route:hover,
      .route:focus-visible {
        transform: translateY(-2px);
        border-color: #6f7e8c;
        background: #181e25;
        outline: none;
      }

      .route-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .icon {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        border: 1px solid currentColor;
      }

      .route.truss .icon {
        color: #f4c95d;
        background: rgba(244, 201, 93, 0.1);
      }

      .route.tools .icon {
        color: #8cebd6;
        background: rgba(140, 235, 214, 0.1);
      }

      .path {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #9da8b3;
        font: 650 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: nowrap;
      }

      .title {
        margin: 0;
        align-self: end;
        font-size: 32px;
        letter-spacing: 0;
        line-height: 1.05;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        color: #b9c2ca;
        font-size: 15px;
      }

      .arrow {
        font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #f3efe6;
      }

      @media (max-width: 720px) {
        main {
          width: min(900px, calc(100vw - 28px));
          padding: 38px 0;
          align-content: start;
        }

        .masthead {
          display: block;
        }

        .routes {
          grid-template-columns: 1fr;
        }

        .route {
          min-height: 150px;
        }

        .path {
          display: none;
        }

        h1 {
          font-size: 46px;
        }

        .title {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="masthead" aria-label="almoststable">
        <div class="brand">
          <h1>almost<span class="domain">stable</span></h1>
          <a class="byline" href="https://github.com/qianxunslimg" target="_blank" rel="noreferrer me">
            <img class="avatar" src="/avatar.png?v=2" alt="" width="24" height="24">
            <span>by qxslimg</span>
          </a>
        </div>
      </section>

      <section class="routes" aria-label="service routes">
        <a class="route truss" href="/truss-engine/">
          <div class="route-top">
            <div class="icon" aria-hidden="true">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 17.5h16M6 17.5l3.2-8 3.2 8 3.2-8 3.2 8" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.2 9.5h6.4M7.2 14h9.6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
                <circle cx="9.2" cy="9.5" r="1.4" fill="currentColor"/>
                <circle cx="15.6" cy="9.5" r="1.4" fill="currentColor"/>
              </svg>
            </div>
            <span class="path">/truss-engine/</span>
          </div>
          <h2 class="title">Truss Engine</h2>
          <div class="meta">
            <span>桁架组合平台</span>
            <span class="arrow">-></span>
          </div>
        </a>

        <a class="route tools" href="/web-tools/">
          <div class="route-top">
            <div class="icon" aria-hidden="true">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
                <circle cx="10" cy="7" r="2" fill="#15191F" stroke="currentColor" stroke-width="1.9"/>
                <circle cx="15" cy="12" r="2" fill="#15191F" stroke="currentColor" stroke-width="1.9"/>
                <circle cx="9" cy="17" r="2" fill="#15191F" stroke="currentColor" stroke-width="1.9"/>
              </svg>
            </div>
            <span class="path">/web-tools/</span>
          </div>
          <h2 class="title">Web Tools</h2>
          <div class="meta">
            <span>个人工具集合</span>
            <span class="arrow">-></span>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
