<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080b10">
    <title>almoststable</title>
    <link rel="icon" href="/avatar.png?v=3" type="image/png">
    <link rel="shortcut icon" href="/avatar.png?v=3" type="image/png">
    <link rel="apple-touch-icon" href="/avatar.png?v=3">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080b10;
        color: #f3efe6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        overflow: hidden;
        background: #080b10;
      }

      body {
        min-height: 100vh;
      }

      #scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #080b10;
      }

      .hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: clamp(18px, 3vw, 40px);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 18px;
      }

      .brand {
        display: grid;
        gap: 7px;
        pointer-events: auto;
      }

      h1 {
        margin: 0;
        color: #f3efe6;
        font-size: clamp(30px, 4vw, 56px);
        line-height: 1;
        letter-spacing: 0;
        font-weight: 780;
        text-shadow: 0 10px 28px rgba(0, 0, 0, 0.38);
      }

      .domain {
        display: inline-block;
        margin-left: 0.05em;
        color: #f4c95d;
      }

      .byline {
        width: max-content;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: #a7b2bd;
        font: 650 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-decoration: none;
        transition: color 160ms ease;
      }

      .byline:hover,
      .byline:focus-visible {
        color: #8cebd6;
        outline: none;
      }

      .avatar {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid rgba(243, 239, 230, 0.26);
        object-fit: cover;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.36);
      }

      .hint {
        max-width: 380px;
        border: 1px solid rgba(140, 235, 214, 0.24);
        border-radius: 8px;
        padding: 12px 14px;
        color: #b8c7d8;
        background: rgba(8, 12, 18, 0.62);
        backdrop-filter: blur(14px);
        font-size: 13px;
        line-height: 1.6;
        overflow-wrap: anywhere;
        pointer-events: auto;
      }

      .hint span {
        display: block;
      }

      .hint span + span {
        margin-top: 3px;
      }

      .hint kbd {
        min-width: 22px;
        display: inline-grid;
        place-items: center;
        margin: 0 2px;
        border: 1px solid rgba(184, 199, 216, 0.34);
        border-radius: 5px;
        padding: 1px 5px;
        color: #f3efe6;
        background: rgba(255, 255, 255, 0.06);
        font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .portal-status {
        align-self: end;
        justify-self: center;
        min-width: min(540px, calc(100vw - 36px));
        min-height: 58px;
        border: 1px solid rgba(244, 201, 93, 0.28);
        border-radius: 10px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        opacity: 0;
        transform: translateY(10px);
        color: #f3efe6;
        background: rgba(12, 15, 20, 0.78);
        backdrop-filter: blur(18px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .portal-status.is-active {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .portal-copy {
        min-width: 0;
      }

      .portal-label {
        color: #f4c95d;
        font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-transform: uppercase;
      }

      .portal-title {
        margin-top: 2px;
        font-weight: 760;
      }

      .routes {
        justify-self: center;
        width: min(1540px, calc(100vw - 36px));
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        pointer-events: auto;
      }

      .route {
        min-width: 0;
        border: 1px solid rgba(129, 145, 164, 0.28);
        border-radius: 8px;
        padding: 14px;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
        color: inherit;
        text-decoration: none;
        background: rgba(10, 14, 20, 0.68);
        backdrop-filter: blur(18px);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .route:hover,
      .route:focus-visible,
      .route.is-active {
        transform: translateY(-2px);
        border-color: var(--accent);
        background: rgba(18, 23, 31, 0.78);
        outline: none;
      }

      .icon {
        width: 40px;
        height: 40px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
      }

      .route-copy {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .route-path {
        overflow: hidden;
        color: #9fb1c6;
        font: 650 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .route-title {
        overflow: hidden;
        font-size: 18px;
        font-weight: 780;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .route-subtitle {
        overflow: hidden;
        color: #b9c2ca;
        font-size: 13px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .touch-controls {
        position: fixed;
        right: 18px;
        bottom: 118px;
        width: 154px;
        height: 118px;
        display: none;
        grid-template-columns: repeat(3, 46px);
        grid-template-rows: repeat(2, 46px);
        gap: 8px;
        pointer-events: auto;
      }

      .touch-controls button {
        border: 1px solid rgba(140, 235, 214, 0.34);
        border-radius: 8px;
        color: #f3efe6;
        background: rgba(9, 14, 20, 0.72);
        backdrop-filter: blur(12px);
        font: 780 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .touch-controls [data-control="forward"] {
        grid-column: 2;
      }

      .touch-controls [data-control="left"] {
        grid-column: 1;
        grid-row: 2;
      }

      .touch-controls [data-control="back"] {
        grid-column: 2;
        grid-row: 2;
      }

      .touch-controls [data-control="right"] {
        grid-column: 3;
        grid-row: 2;
      }

      .noscript {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #080b10;
      }

      .noscript-inner {
        max-width: 520px;
        display: grid;
        gap: 14px;
      }

      .noscript a {
        color: #8cebd6;
      }

      @media (max-width: 820px) {
        html,
        body {
          overflow: auto;
        }

        .hud {
          min-height: 100vh;
          padding: 18px;
        }

        .topbar {
          display: grid;
          gap: 14px;
        }

        .hint {
          max-width: none;
        }

        .routes {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .touch-controls {
          display: none;
        }
      }

      @media (max-width: 560px) {
        .routes {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-label="3D driving entrance"></canvas>

    <main class="hud">
      <section class="topbar" aria-label="almoststable">
        <div class="brand">
          <h1>almost<span class="domain">stable</span></h1>
          <a class="byline" href="https://github.com/qianxunslimg" target="_blank" rel="noreferrer me">
            <img class="avatar" src="/avatar.png?v=3" alt="" width="22" height="22">
            <span>by qxslimg</span>
          </a>
        </div>
        <div class="hint">
          <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或方向键开车。</span>
          <span>驶入发光车位会直接进入；也可以点击下面入口。</span>
        </div>
      </section>

      <section class="portal-status" id="portal-status" aria-live="polite">
        <div class="portal-copy">
          <div class="portal-label">entering</div>
          <div class="portal-title" id="portal-title">选择一个入口</div>
        </div>
      </section>

      <nav class="routes" aria-label="service routes">
        <a class="route" style="--accent: #f4c95d" href="/truss-engine/" data-route="truss">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 17.5h16M6 17.5l3.2-8 3.2 8 3.2-8 3.2 8" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.2 9.5h6.4M7.2 14h9.6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="route-copy">
            <span class="route-path">/truss-engine/</span>
            <span class="route-title">Truss Engine</span>
            <span class="route-subtitle">桁架组合平台</span>
          </span>
        </a>

        <a class="route" style="--accent: #8cebd6" href="/web-tools/" data-route="tools">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
              <circle cx="10" cy="7" r="2" fill="#111821" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="15" cy="12" r="2" fill="#111821" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="9" cy="17" r="2" fill="#111821" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </span>
          <span class="route-copy">
            <span class="route-path">/web-tools/</span>
            <span class="route-title">Web Tools</span>
            <span class="route-subtitle">个人工具集合</span>
          </span>
        </a>

        <a class="route" style="--accent: #a6e86d" href="/userscripts/" data-route="scripts">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 4.5h7.2c1.1 0 1.9.8 1.9 1.9v13.1H8.8c-1.6 0-2.9-1.3-2.9-2.9V6.6c0-1.2.9-2.1 2.1-2.1Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/>
              <path d="M9.2 9h4.8M9.2 12.4h5.8M9.2 15.8h3.4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
              <path d="M6 16.6c0-1.2 1-2.1 2.2-2.1h8.9" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="route-copy">
            <span class="route-path">/userscripts/</span>
            <span class="route-title">Userscripts</span>
            <span class="route-subtitle">油猴脚本库</span>
          </span>
        </a>

        <a class="route" style="--accent: #7be263" href="/games/" data-route="games">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.5 9.2h9c2.1 0 3.8 1.7 3.8 3.8v2.2c0 1.7-1.4 3.1-3.1 3.1-.9 0-1.7-.4-2.3-1.1l-.9-1.1h-4l-.9 1.1c-.6.7-1.4 1.1-2.3 1.1-1.7 0-3.1-1.4-3.1-3.1V13c0-2.1 1.7-3.8 3.8-3.8Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/>
              <path d="M8.2 12.2v3M6.7 13.7h3M15.7 13.2h.1M17.9 15.1h.1" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="route-copy">
            <span class="route-path">/games/</span>
            <span class="route-title">Game Playset</span>
            <span class="route-subtitle">网页游戏合集</span>
          </span>
        </a>

        <a class="route" style="--accent: #f2a3b3" href="/blog/" data-route="blog">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 4.5h8.4c1 0 1.6.6 1.6 1.6v13.4H7c-1.1 0-2-.9-2-2v-11c0-1.1.9-2 2-2Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/>
              <path d="M8.5 8.5h5.8M8.5 12h5.8M8.5 15.5h3.4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="route-copy">
            <span class="route-path">/blog/</span>
            <span class="route-title">Blog</span>
            <span class="route-subtitle">个人博客</span>
          </span>
        </a>
      </nav>
    </main>

    <div class="touch-controls" aria-label="touch driving controls">
      <button type="button" data-control="forward">↑</button>
      <button type="button" data-control="left">←</button>
      <button type="button" data-control="back">↓</button>
      <button type="button" data-control="right">→</button>
    </div>

    <noscript>
      <div class="noscript">
        <div class="noscript-inner">
          <h2>almoststable</h2>
          <p>这个入口需要 JavaScript 才能显示 3D 场景。</p>
          <a href="/truss-engine/">Truss Engine</a>
          <a href="/web-tools/">Web Tools</a>
          <a href="/userscripts/">Userscripts</a>
          <a href="/games/">Game Playset</a>
          <a href="/blog/">Blog</a>
        </div>
      </div>
    </noscript>

    <script type="module" src="/drive-scene.js?v=6"></script>
  </body>
</html>
