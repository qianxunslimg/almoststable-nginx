map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

map $http_x_forwarded_host $serve_directory_root {
  default 0;
  almoststable.com 1;
}

upstream truss_frontend {
  server host.docker.internal:10001;
}

upstream truss_backend {
  server host.docker.internal:10000;
}

upstream web_tools_frontend {
  server host.docker.internal:9001;
}

upstream browser_game_playset {
  server host.docker.internal:8094;
}

server {
  listen 80;
  server_name trussengine.site almoststable.com _;

  client_max_body_size 64m;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/wasm
    application/octet-stream
    image/svg+xml
    model/step;

  location = /healthz {
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /favicon.ico {
    root /usr/share/nginx/html;
    try_files /avatar.png =404;
    default_type image/png;
  }

  location = /favicon.svg {
    root /usr/share/nginx/html;
    try_files /favicon.svg =404;
    default_type image/svg+xml;
  }

  location = /avatar.png {
    root /usr/share/nginx/html;
    try_files /avatar.png =404;
  }

  location = /drive-scene.js {
    root /usr/share/nginx/html;
    try_files /drive-scene.js =404;
    default_type application/javascript;
  }

  location /vendor/ {
    root /usr/share/nginx/html;
    try_files $uri =404;
  }

  location = / {
    # Cloudflare Worker marks the public domain here while using trussengine.site as origin.
    if ($serve_directory_root = 0) {
      return 302 /truss-engine/;
    }

    root /usr/share/nginx/html;
    try_files /index.html =404;
  }

  location = /blog {
    return 301 /blog/;
  }

  location ~ ^/blog/(.*)$ {
    return 302 https://qianxunslimg.space/$1$is_args$args;
  }

  location = /truss-engine {
    return 301 /truss-engine/;
  }

  location /truss-engine/api/ {
    rewrite ^/truss-engine(/api/.*)$ $1 break;
    proxy_pass http://truss_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /truss-engine;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  location /truss-engine/assets/ {
    root /srv;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /truss-engine/favicon-truss.svg {
    root /srv;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  location /truss-engine/ {
    root /srv;
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /truss-engine/index.html;
  }

  location = /web-tools {
    return 301 /web-tools/;
  }

  location = /userscripts {
    return 301 /userscripts/;
  }

  location = /games {
    return 301 /games/;
  }

  location /userscripts/assets/ {
    root /srv;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~ ^/userscripts/[^/]+\.user\.js$ {
    root /srv;
    default_type application/javascript;
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri =404;
  }

  location /userscripts/ {
    root /srv;
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /userscripts/index.html;
  }

  location /games/ {
    proxy_pass http://browser_game_playset/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /games;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  location /web-tools/api/ {
    proxy_pass http://web_tools_frontend/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /web-tools;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  location = /web-tools/docs {
    proxy_pass http://web_tools_frontend/docs;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /web-tools;
  }

  location = /web-tools/openapi.json {
    proxy_pass http://web_tools_frontend/openapi.json;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /web-tools;
  }

  location /web-tools/ {
    proxy_pass http://web_tools_frontend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /web-tools;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }
}
