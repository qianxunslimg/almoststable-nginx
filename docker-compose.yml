name: almoststable-nginx

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    mem_limit: 128m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ../truss-engine-web/frontend/dist:/srv/truss-engine:ro
      - ../userscripts/dist:/srv/userscripts:ro
    ports:
      - "0.0.0.0:80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
